<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle (optional, provides contrast) -->
  <circle cx="100" cy="100" r="98" fill="#ffffff" />
  
  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a365d" stroke-width="4" />
  
  <!-- Tree Silhouette (representing the tree in the logo) -->
  <path 
    d="M60,110 C50,90 60,70 80,65 C85,50 105,45 120,55 C135,50 145,65 140,80 C150,90 145,110 130,115 C115,120 85,120 60,110 Z" 
    fill="#1b4332" 
    opacity="0.95"
  />
  
  <!-- Tree Trunk -->
  <rect x="97" y="100" width="6" height="25" fill="#5c4033" />

  <!-- Open Bible at the bottom -->
  <path 
    d="M 60,135 Q 80,125 100,135 Q 120,125 140,135 L 140,145 Q 120,135 100,145 Q 80,135 60,145 Z" 
    fill="#f8f9fa" 
    stroke="#000000" 
    stroke-width="3" 
  />
  <path d="M 100,135 L 100,145" stroke="#000000" stroke-width="2" /> <!-- Center line of Bible -->

  <!-- Holy Cross in the middle, in front of the tree -->
  <rect x="95" y="65" width="10" height="55" fill="#c5a880" rx="1.5" />
  <rect x="80" y="78" width="40" height="10" fill="#c5a880" rx="1.5" />
  
  <!-- Extra small cross details -->
  <rect x="98" y="67" width="4" height="51" fill="#f8fafc" opacity="0.4" />
</svg>